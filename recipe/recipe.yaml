schema_version: 1

context:
  version: "1.17.0"

package:
  name: firecrawl
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/firecrawl/firecrawl-${{ version }}.tar.gz
  sha256: 71d54390bc229e70f536b34d0365eec9d59b4f4cab84670a6f3016a612dd79ca

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=42
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - requests
    - python-dotenv
    - websockets
    - nest-asyncio
    - pydantic >=2.10.3

tests:
  - python:
      imports:
        - firecrawl
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python SDK for Firecrawl API
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/firecrawl/firecrawl
  repository: https://github.com/firecrawl/firecrawl
  documentation: https://docs.firecrawl.dev

extra:
  recipe-maintainers:
    - moritzwilksch
